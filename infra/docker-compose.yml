services:
  # ─── PostgreSQL + PostGIS ─────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: tramitto_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tramitto_db
      POSTGRES_USER: tramitto_user
      POSTGRES_PASSWORD: tramitto_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tramitto_user -d tramitto_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tramitto_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: tramitto_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: tramitto_rabbit
      RABBITMQ_DEFAULT_PASS: tramitto_rabbit_pass
      RABBITMQ_DEFAULT_VHOST: tramitto
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── MinIO ────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: tramitto_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: tramitto_minio
      MINIO_ROOT_PASSWORD: tramitto_minio_pass
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
